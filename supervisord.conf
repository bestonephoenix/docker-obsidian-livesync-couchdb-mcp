[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:couchdb]
command=/docker-entrypoint.sh /opt/couchdb/bin/couchdb
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:mcp-server]
command=/opt/venv/bin/python3 /scripts/mcp_sse_server.py
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20
startsecs=2
environment=OBSIDIAN_COUCH_URL="http://localhost:5984",OBSIDIAN_COUCH_USER="%(ENV_COUCHDB_USER)s",OBSIDIAN_COUCH_PASS="%(ENV_COUCHDB_PASSWORD)s",OBSIDIAN_COUCH_DB="%(ENV_COUCHDB_DATABASE)s",FASTMCP_HOST="0.0.0.0",FASTMCP_PORT="8000"
